<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Explore battery fleet telemetry and individual recorded battery history."
    />
    <meta name="theme-color" content="#121a17" />
    <script>
      ;(() => {
        try {
          const preference = localStorage.getItem('battery-ops-theme') || 'dark'
          const isDark =
            preference === 'dark' ||
            (preference === 'system' && matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.classList.toggle('dark', isDark)
          document.documentElement.dataset.theme = preference
          document.documentElement.dataset.resolvedTheme = isDark ? 'dark' : 'light'
          document.documentElement.style.colorScheme = isDark ? 'dark' : 'light'
          document
            .querySelector('meta[name="theme-color"]')
            ?.setAttribute('content', isDark ? '#121a17' : '#f5f8f5')
        } catch {
          // The application hook applies the default theme when storage is unavailable.
        }
      })()
    </script>
    <title>Battery Ops</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
